<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tech Meetup Survey</title>
</head>
<body>

  <h1 id="title">Tech Meetup Registration</h1>
  <p id="description">Please fill out the form below.</p>

  <form id="survey-form">
    
    <label id="name-label" for="name">Name:</label>
    <input type="text" id="name" placeholder="Enter name" required>
    <br><br>

    <label id="email-label" for="email">Email:</label>
    <input type="email" id="email" placeholder="Enter email" required>
    <br><br>

    <label id="number-label" for="number">Age:</label>
    <input type="number" id="number" min="18" max="99" placeholder="18-99">
    <br><br>

    <label for="dropdown">Role:</label>
    <select id="dropdown">
      <option value="student">Student</option>
      <option value="professional">Professional</option>
    </select>
    <br><br>

    <p>Attending in person?</p>
    <label><input type="radio" name="attend" value="yes"> Yes</label>
    <label><input type="radio" name="attend" value="no"> No</label>
    <br><br>

    <p>Interests:</p>
    <label><input type="checkbox" value="coding"> Coding</label>
    <label><input type="checkbox" value="design"> Design</label>
    <br><br>

    <p>Comments:</p>
    <textarea id="comments" placeholder="Leave a comment"></textarea>
    <br><br>

    <button type="submit" id="submit">Submit</button>

  </form>

</body>
</html>
